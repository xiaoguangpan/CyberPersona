services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_BOOTSTRAP_PHONE: ${ADMIN_BOOTSTRAP_PHONE:-}
    extra_hosts:
      - "cpa.itxgp.com:host-gateway"
    ports:
      - "127.0.0.1:3020:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - cyberpersona_media:/app/.cyberpersona-media
    command: sh -c "npm ci && npm run db:generate && npm run db:migrate && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
  cyberpersona_media:
