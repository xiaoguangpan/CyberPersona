services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cyberpersona
      POSTGRES_USER: cyberpersona
      POSTGRES_PASSWORD: cyberpersona
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberpersona -d cyberpersona"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://cyberpersona:cyberpersona@db:5432/cyberpersona?schema=public
    ports:
      - "3000:3000"
    volumes:
      - cyberpersona_media:/app/.cyberpersona-media

volumes:
  postgres_data:
  cyberpersona_media:
